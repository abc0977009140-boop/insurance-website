<svg width="1000" height="1000" viewBox="0 0 680 680" xmlns="http://www.w3.org/2000/svg">
  <title>保險白話文 Logo</title>
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#e8f5f0"/>
      <stop offset="50%" stop-color="#d6eee8"/>
      <stop offset="100%" stop-color="#c5e3dc"/>
    </radialGradient>
    <radialGradient id="innerGlow" cx="45%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b8d8d0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bulbGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#f5e8c0" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e8c870" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer gold ring -->
  <circle cx="340" cy="340" r="315" fill="none" stroke="#c8a84b" stroke-width="3.5"/>
  <circle cx="340" cy="340" r="308" fill="none" stroke="#e8c870" stroke-width="1"/>

  <!-- Background fill -->
  <circle cx="340" cy="340" r="305" fill="url(#bgGrad)"/>
  <circle cx="340" cy="340" r="305" fill="url(#innerGlow)"/>

  <!-- Chat bubble — rounder corners -->
  <path d="M170 150 Q170 110 210 110 L470 110 Q510 110 510 150 L510 318 Q510 358 470 358 L390 358 L365 398 L358 358 L210 358 Q170 358 170 318 Z"
        fill="#ffffff" fill-opacity="0.72" stroke="#2e8b7a" stroke-width="3" stroke-linejoin="round"/>

  <!-- Bulb glow -->
  <ellipse cx="340" cy="235" rx="72" ry="72" fill="url(#bulbGlow)"/>

  <!-- Lightbulb glass -->
  <path d="M288 207 a52 52 0 0 1 104 0 c0 30-14 50-26 62 l0 24 -52 0 0-24 c-12-12-26-32-26-62z"
        fill="#f8f0d8" fill-opacity="0.88" stroke="#b8922a" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Base segments -->
  <rect x="306" y="293" width="68" height="9" rx="2" fill="#d4a832" fill-opacity="0.75" stroke="#b8922a" stroke-width="1.2"/>
  <rect x="310" y="304" width="60" height="9" rx="2" fill="#d4a832" fill-opacity="0.60" stroke="#b8922a" stroke-width="1.2"/>
  <rect x="314" y="315" width="52" height="9" rx="2" fill="#d4a832" fill-opacity="0.45" stroke="#b8922a" stroke-width="1.2"/>

  <!-- Heart inside bulb -->
  <path d="M340 225 c0 0 -16-13-16-24 a12 12 0 0 1 16-9 a12 12 0 0 1 16 9 c0 11-16 24-16 24z"
        fill="#2e8b7a" fill-opacity="0.75"/>

  <!-- Sparkle top-right -->
  <g transform="translate(378,170)">
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#c8a84b" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#c8a84b" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="-7" y1="-7" x2="7" y2="7" stroke="#c8a84b" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="7" y1="-7" x2="-7" y2="7" stroke="#c8a84b" stroke-width="1.4" stroke-linecap="round"/>
  </g>
  <!-- Small sparkle -->
  <g transform="translate(400,198)">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#c8a84b" stroke-width="1.6" stroke-linecap="round"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#c8a84b" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- 保險白話文 text -->
  <text x="340" y="510" text-anchor="middle"
        font-family="'Noto Sans TC', 'PingFang TC', 'Microsoft JhengHei', sans-serif"
        font-size="62" font-weight="600"
        fill="#1a6b5e" letter-spacing="4">保險白話文</text>

</svg>
